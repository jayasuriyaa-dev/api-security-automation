name: Automated API Security Fuzzing

on: 
  push:
    branches:
      - main

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Install Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Newman and HTML Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          
      - name: Fire the Newman Barrage
        run: >
          newman run QA_Collection.json 
          -e QA_Environment.json 
          -d ai_fuzzing_data.json 
          -r htmlextra
          
      - name: Upload the Executive Dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Newman-Dashboard
          path: newman/
